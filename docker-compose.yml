name: agno-runtime-platform
services:
  agno-runtime:
    image: 192.168.100.43:5000/aicore.mcp.api:0.0.1
    container_name: agno-runtime
    restart: unless-stopped
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PORT:-8080}:8080"
    networks:
      - ai-core
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
networks:
  ai-core:
    external: true